name: CI

on:
  push:
    branches: [main, master, develop, "feature/**", "codex/**"]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"
  POETRY_VERSION: "2.3.3"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Validate package metadata
        run: poetry check

      - name: Run lint
        run: make lint

      - name: Run typecheck
        run: make typecheck

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: make tests

      - name: Test CLI execution
        run: |
          poetry run kickstart --help
          poetry run kickstart version

  integration-test:
    name: Integration Test - Generate Projects
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Test Python service generation
        run: |
          poetry run kickstart create service test-python-service \
            --root /tmp \
            --lang python \
            --database none \
            --cache none \
            --auth jwt \
            --framework fastapi

          test -f /tmp/test-python-service/src/main.py
          test -f /tmp/test-python-service/requirements.txt
          test -f /tmp/test-python-service/Dockerfile
          test -f /tmp/test-python-service/README.md

      - name: Test Go service generation
        run: |
          poetry run kickstart create service test-go-service \
            --root /tmp \
            --lang go

          test -f /tmp/test-go-service/src/main.go
          test -f /tmp/test-go-service/go.mod
          test -f /tmp/test-go-service/Dockerfile

      - name: Test library generation
        run: |
          poetry run kickstart create lib test-library \
            --root /tmp \
            --lang python

          test -f /tmp/test-library/setup.py || test -f /tmp/test-library/pyproject.toml

      - name: Test CLI generation
        run: |
          poetry run kickstart create cli test-cli-tool \
            --root /tmp \
            --lang python

          test -d /tmp/test-cli-tool

      - name: Smoke test Cloudflare Worker flagship profile
        shell: bash
        run: |
          set -euo pipefail

          worker_temp_root="$(mktemp -d /tmp/kickstart-cf-worker-smoke-XXXXXX)"
          worker_project_name="test-cf-worker-flagship"
          worker_project_path="${worker_temp_root}/${worker_project_name}"
          worker_log_dir="${worker_temp_root}/logs"
          generation_log_path="${worker_log_dir}/generate.log"

          mkdir -p "${worker_log_dir}"

          echo "Cloudflare Worker smoke temp root: ${worker_temp_root}"
          echo "Generated Cloudflare Worker project path: ${worker_project_path}"
          echo "Smoke log directory: ${worker_log_dir}"

          if poetry run kickstart create service "${worker_project_name}" \
            --root "${worker_temp_root}" \
            --lang typescript \
            --runtime cloudflare-workers >"${generation_log_path}" 2>&1; then
            echo "Generation passed for Cloudflare Worker flagship profile."
          else
            exit_code=$?
            echo "::error title=Cloudflare Worker generation failed::project=${worker_project_path}; command=poetry run kickstart create service ${worker_project_name} --root ${worker_temp_root} --lang typescript --runtime cloudflare-workers; exit_code=${exit_code}; log=${generation_log_path}"
            echo "---- tail -n 80 ${generation_log_path} ----"
            tail -n 80 "${generation_log_path}" || true
            echo "---- end log tail ----"
            exit "${exit_code}"
          fi

          run_smoke_command() {
            local log_name="$1"
            shift
            local command_display="$*"
            local log_path="${worker_log_dir}/${log_name}.log"

            echo "Running command in generated project: ${command_display}"
            if (cd "${worker_project_path}" && "$@") >"${log_path}" 2>&1; then
              echo "Command passed: ${command_display}"
            else
              local exit_code=$?
              echo "::error title=Cloudflare Worker smoke check failed::project=${worker_project_path}; command=${command_display}; exit_code=${exit_code}; log=${log_path}"
              echo "---- tail -n 80 ${log_path} ----"
              tail -n 80 "${log_path}" || true
              echo "---- end log tail ----"
              exit "${exit_code}"
            fi
          }

          run_smoke_command make-install make install
          run_smoke_command make-test make test
          run_smoke_command make-check make check

      - name: Verify template syntax
        run: |
          python -m py_compile /tmp/test-python-service/src/main.py
          python -m py_compile /tmp/test-python-service/src/api/__init__.py
          python -m py_compile /tmp/test-python-service/src/model/__init__.py

  website:
    name: Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install website dependencies
        run: bun install --frozen-lockfile

      - name: Check website
        run: bun run check

  build-test:
    name: Manual Package & Binary for ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runner }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: macos-15-intel
            platform: macos-x64
          - runner: macos-15
            platform: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build package
        run: make package

      - name: Build standalone binary
        run: make binary

      - name: Name, install, and check binary
        env:
          PLATFORM: ${{ matrix.platform }}
          PYTHON_MINOR: ${{ env.PYTHON_VERSION }}
        run: |
          asset="kickstart-${PLATFORM}-py${PYTHON_MINOR}"
          mv dist/kickstart "dist/${asset}"
          "dist/${asset}" version
          install -m 0755 "dist/${asset}" "${RUNNER_TEMP}/kickstart"
          "${RUNNER_TEMP}/kickstart" --help
          shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kickstart-${{ matrix.platform }}-py${{ env.PYTHON_VERSION }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/kickstart-*
          retention-days: 7

name: CI

on:
  push:
    branches: [main, master, develop, "feature/**", "codex/**"]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"
  POETRY_VERSION: "2.3.3"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Validate package metadata
        run: poetry check

      - name: Run lint
        run: make lint

      - name: Run typecheck
        run: make typecheck

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Run tests
        run: make tests

      - name: Test CLI execution
        run: |
          poetry run kickstart --help
          poetry run kickstart version

  integration-test:
    name: Integration Test - Generate Projects
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Test Python service generation
        run: |
          poetry run kickstart create service test-python-service \
            --root /tmp \
            --lang python \
            --database none \
            --cache none \
            --auth jwt \
            --framework fastapi

          test -f /tmp/test-python-service/src/main.py
          test -f /tmp/test-python-service/requirements.txt
          test -f /tmp/test-python-service/Dockerfile
          test -f /tmp/test-python-service/README.md

      - name: Test Go service generation
        run: |
          poetry run kickstart create service test-go-service \
            --root /tmp \
            --lang go

          test -f /tmp/test-go-service/src/main.go
          test -f /tmp/test-go-service/go.mod
          test -f /tmp/test-go-service/Dockerfile

      - name: Test library generation
        run: |
          poetry run kickstart create lib test-library \
            --root /tmp \
            --lang python

          test -f /tmp/test-library/setup.py || test -f /tmp/test-library/pyproject.toml

      - name: Test CLI generation
        run: |
          poetry run kickstart create cli test-cli-tool \
            --root /tmp \
            --lang python

          test -d /tmp/test-cli-tool

      # Dogfood gate: kickstart must bootstrap a kickstart-like project that
      # passes taste rules and its own `make check`. CI runs the headline
      # python case; the full matrix stays a local eval (docs/evals.md).
      - name: Restore bootstrap eval dependency cache
        uses: actions/cache@v4
        with:
          path: /tmp/bootstrap-eval-cache
          key: bootstrap-eval-${{ runner.os }}-${{ hashFiles('src/stack/toolchain_versions.py', 'src/templates/python/**') }}
          restore-keys: |
            bootstrap-eval-${{ runner.os }}-

      - name: Bootstrap eval (python CLI + full-extension service, TS worker, Rust CLI)
        run: |
          PYTHONPATH=$(pwd) poetry run python scripts/bootstrap_eval.py \
            --cases python-cli-kickstart-like python-service typescript-worker rust-cli \
            --output-root /tmp/bootstrap-eval \
            --cache-root /tmp/bootstrap-eval-cache \
            --report /tmp/bootstrap-eval.md

      - name: Smoke test kickstart install subcommand
        run: |
          scripts/ci/smoke-install.sh \
            "poetry run kickstart" \
            "${RUNNER_TEMP}/kickstart-install-smoke" \
            "${RUNNER_TEMP}/kickstart-install-smoke-app" \
            "${RUNNER_TEMP}/install-smoke.zshrc"

      - name: Smoke test Cloudflare Worker flagship profile
        run: scripts/ci/smoke-cloudflare-worker.sh

      - name: Verify template syntax
        run: |
          python -m py_compile /tmp/test-python-service/src/main.py
          python -m py_compile /tmp/test-python-service/src/api/__init__.py
          python -m py_compile /tmp/test-python-service/src/model/__init__.py

  website:
    name: Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install website dependencies
        run: bun install --frozen-lockfile

      - name: Check website
        run: bun run check

  build-test:
    name: Manual Package & Binary for ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runner }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: macos-15-intel
            platform: macos-x64
          - runner: macos-15
            platform: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Build package
        run: make package

      - name: Build kickstart binary
        run: make binary

      - name: Name, smoke-test, and archive binary
        env:
          PLATFORM: ${{ matrix.platform }}
          PYTHON_MINOR: ${{ env.PYTHON_VERSION }}
        run: scripts/ci/name-and-smoke-binary.sh "${PLATFORM}" "${PYTHON_MINOR}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kickstart-${{ matrix.platform }}-py${{ env.PYTHON_VERSION }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/kickstart-*.tar.gz.sha256
          retention-days: 7

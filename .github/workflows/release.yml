name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PYTHON_VERSION: "3.14"
  POETRY_VERSION: "2.3.3"

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run checks
        run: make check

  package:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build package
        run: make package

      - name: Publish to PyPI
        if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') }}
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$POETRY_PYPI_TOKEN_PYPI" ]; then
            poetry publish --no-interaction
          else
            echo "PYPI_API_TOKEN not set, skipping PyPI publish"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 7

  binary:
    name: Build ${{ matrix.python-version }} Binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build standalone binary
        run: make binary

      - name: Name binary artifact
        env:
          PYTHON_MINOR: ${{ matrix.python-version }}
        run: |
          platform="$(echo "${RUNNER_OS}-${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          mv dist/kickstart "dist/kickstart-${platform}-py${PYTHON_MINOR}"
          "dist/kickstart-${platform}-py${PYTHON_MINOR}" version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}
          path: dist/kickstart-*
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package, binary]
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/python-package

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/python-package/*.whl
            artifacts/python-package/*.tar.gz
            artifacts/binaries/kickstart-*
          body: |
            ## Installation

            Install from PyPI when published:

            ```bash
            pip install kickstart
            ```

            Standalone binaries are attached for Linux and macOS across the supported Python minor versions.

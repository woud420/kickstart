name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PYTHON_VERSION: "3.14"
  POETRY_VERSION: "2.3.3"

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Release tags must point to commits already merged to master."
            exit 1
          fi

      # `make release-check` only uses the stdlib (tomllib), so we set up Python
      # before Poetry — the release-check policy can run without the venv.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify release version
        run: make release-check TAG="$GITHUB_REF_NAME"

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Run checks
        run: make check

      # The website version-sync test (content.ts <-> pyproject.toml) must
      # gate the release BEFORE anything publishes; the website job below
      # runs after the GitHub Release exists, which is too late to stop a
      # desynced changelog from shipping.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Check website (version sync gate)
        working-directory: website
        run: |
          bun install --frozen-lockfile
          bun run check

  package:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Build package
        run: make package

      - name: Publish to PyPI
        if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') }}
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$POETRY_PYPI_TOKEN_PYPI" ]; then
            poetry publish --no-interaction --skip-existing
          else
            echo "PYPI_API_TOKEN not set, skipping PyPI publish"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 7

  binary:
    name: Build ${{ matrix.platform }} Python ${{ matrix.python-version }} Binary
    runs-on: ${{ matrix.runner }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
            python-version: "3.14"
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
            python-version: "3.14"
          - runner: macos-15
            platform: macos-arm64
            python-version: "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Build kickstart binary
        run: make binary

      - name: Name, smoke-test, and archive binary
        env:
          PLATFORM: ${{ matrix.platform }}
          PYTHON_MINOR: ${{ matrix.python-version }}
        run: scripts/ci/name-and-smoke-binary.sh "${PLATFORM}" "${PYTHON_MINOR}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-py${{ matrix.python-version }}
          path: |
            dist/kickstart-*.tar.gz
            dist/kickstart-*.tar.gz.sha256
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package, binary]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/python-package

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/binaries
          merge-multiple: true

      - name: Stage install script
        run: |
          mkdir -p artifacts/scripts
          install -m 0755 scripts/install.sh artifacts/scripts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: false
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
          files: |
            artifacts/python-package/*.whl
            artifacts/python-package/*.tar.gz
            artifacts/binaries/kickstart-*
            artifacts/scripts/install.sh
          body: |
            ## Installation

            One-line install (latest stable release, into `~/.local/bin`):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/install.sh | bash
            ```

            The script downloads the matching binary archive, verifies its SHA-256, installs the binary payload under a stable directory, and exposes `kickstart` on `PATH`.

            ### From PyPI

            ```bash
            pip install kickstart
            ```

            ### Manual binary install

            Binary archives are attached for `linux-x64`, `linux-arm64`, and `macos-arm64` (Python 3.14). Other platforms install from PyPI. Pick the asset for your platform, extract it, and run `kickstart install` to place the binary payload in a user-writable directory and configure `PATH`:

            ```bash
            curl -L -o kickstart-linux-x64-py3.14.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/kickstart-linux-x64-py3.14.tar.gz"
            tar -xzf kickstart-linux-x64-py3.14.tar.gz
            ./kickstart-linux-x64-py3.14/kickstart install --update-path
            ```

            Pass `--target /usr/local/bin` to choose a different launcher directory, `--app-dir /usr/local/share/kickstart` to choose the binary payload directory, and `--shell bash|zsh|fish` to override shell detection. Check the matching `.sha256` file before installing when you want integrity verification.

  website:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: release
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install website dependencies
        run: bun install --frozen-lockfile

      - name: Check website
        run: bun run check

      - name: Check website deploy credentials
        id: website-deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_REPOSITORY" = "woud420/kickstart" ]; then
            # On the canonical repo a missing credential means the public
            # site silently stops tracking releases — fail instead of
            # green-skipping (the pattern that stranded v0.4.3 untagged).
            echo "::error::Cloudflare website credentials are not configured; the release website deploy cannot run. Configure the CLOUDFLARE_ACCOUNT_ID variable and CLOUDFLARE_WEBSITE_API_TOKEN secret."
            exit 1
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare website credentials are not configured; skipping website deploy (fork)."
          fi

      - name: Deploy website with Alchemy
        if: ${{ steps.website-deploy.outputs.ready == 'true' }}
        env:
          ALCHEMY_TELEMETRY_DISABLED: "1"
          # The Worker and its custom domain are created with `adopt: true`, so
          # every deploy converges on the same named resources. Ephemeral CI
          # state cannot orphan infrastructure here, which makes Alchemy's CI
          # local-state-store guard safe to disable. When the optional
          # ALCHEMY_PASSWORD / ALCHEMY_STATE_TOKEN secrets are configured,
          # alchemy.run.ts upgrades to the persistent CloudflareStateStore.
          ALCHEMY_CI_STATE_STORE_CHECK: "false"
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run deploy:release

      # Deployed-vs-source parity is otherwise unobservable: the site can
      # serve a stale version for weeks with every check green. /healthz
      # reports the served version; assert it matches the tag we released.
      - name: Verify the deployed website serves this release
        if: ${{ steps.website-deploy.outputs.ready == 'true' }}
        run: |
          EXPECTED="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            DEPLOYED=$(curl -fsSL https://kickstart-cli.org/healthz | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',''))" || true)
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "kickstart-cli.org serves v${DEPLOYED}."
              exit 0
            fi
            echo "Attempt ${attempt}: deployed version '${DEPLOYED}' != '${EXPECTED}'; retrying in 15s..."
            sleep 15
          done
          echo "::error::kickstart-cli.org still serves '${DEPLOYED}' instead of '${EXPECTED}' after deploy."
          exit 1

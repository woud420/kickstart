name: {{ monorepo_name }}

services:
  app:
    profiles: ["app"]
    image: {{ monorepo_name }}:local
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/{{ monorepo_name | replace("-", "_") }}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: {{ monorepo_name | replace("-", "_") }}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../data/postgres/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d {{ monorepo_name | replace("-", "_") }}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

volumes:
  postgres-data:

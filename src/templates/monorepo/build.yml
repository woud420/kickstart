name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

{% if uses_bun_turbo %}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

{% endif %}
      - run: make install
      - run: make typecheck
      - run: make test
      - run: make build

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ monorepo_name }}-default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ monorepo_name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

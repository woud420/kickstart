apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/name: {{ monorepo_name }}
  app.kubernetes.io/part-of: {{ monorepo_name }}
  app.kubernetes.io/managed-by: kustomize
